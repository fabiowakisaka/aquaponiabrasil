<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8996333447529356" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JB0HG78W4F"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JB0HG78W4F');
    </script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Técnico de Aquaponia - Aquaponia Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;700&family=Source+Serif+Pro:wght@600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #69A84F; --dark: #1a1a1a; --white: #ffffff; }
        body { font-family: 'Raleway', sans-serif; margin: 0; background: #f0f2f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .capture-card { background: var(--white); max-width: 450px; width: 90%; padding: 40px; border-radius: 12px; box-shadow: 0 20px 50px rgba(0,0,0,0.15); text-align: center; }
        .brand { font-family: 'Source Serif Pro', serif; color: var(--primary); font-size: 24px; text-decoration: none; font-weight: bold; display: block; margin-bottom: 20px; }
        h1 { font-family: 'Source Serif Pro', serif; font-size: 28px; color: var(--dark); margin-bottom: 15px; line-height: 1.2; }
        p { color: #555; font-size: 16px; margin-bottom: 25px; line-height: 1.5; }
        .highlights { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 8px; margin-bottom: 25px; border: 1px solid #eee; }
        .highlights div { margin-bottom: 10px; font-size: 14px; color: #333; display: flex; align-items: center; }
        .highlights b { color: var(--primary); margin-right: 10px; font-size: 18px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input { padding: 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(105, 168, 79, 0.2); }
        .btn-send { background: var(--primary); color: white; padding: 18px; border: none; border-radius: 6px; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .btn-send:hover { background: #558a3f; transform: translateY(-2px); }
        #status-msg { display: none; margin-top: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="capture-card">
        <a href="index2.html" class="brand">Aquaponia Brasil</a>
        <h1>Guia Técnico de Introdução</h1>
        <p>Receba agora o manual para planejar seu sistema e evitar erros de dimensionamento.</p>

        <div class="highlights">
            <div><b>✓</b> Dimensionamento de Tanques</div>
            <div><b>✓</b> Cálculo de Filtragem Bio</div>
            <div><b>✓</b> Ciclo do Nitrogênio</div>
        </div>

        <form id="lead-form">
            <input type="text" name="name" placeholder="Nome Completo" required>
            <input type="email" name="email" placeholder="Seu melhor e-mail" required>
            <button type="submit" class="btn-send" id="btn-submit">Acessar Guia Agora</button>
        </form>

        <div id="status-msg">Salvando dados e gerando acesso...</div>
    </div>

    <script>
        const scriptURL = 'https://script.google.com/macros/s/AKfycbwaI16jmJf8VSEp_bMNpTRLkla7_GPmiHy72T09C3EiQXwt8uc-C7YRiyhvRCWKy1l5/exec';
        const form = document.getElementById('lead-form');
        const btn = document.getElementById('btn-submit');
        const status = document.getElementById('status-msg');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = 'PROCESSANDO...';
            status.style.display = 'block';

            // Preparação dos dados para o Google Sheets
            const formData = new FormData(form);
            formData.append('origin', 'Landing Page Lead');

            // Lógica CORRIGIDA: mode 'no-cors' envia o dado mesmo com bloqueio de resposta do navegador
            fetch(scriptURL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: formData 
            })
            .then(() => {
                // Sucesso "Silencioso": O dado chegou na planilha, agora mudamos de página
                window.location.href = 'obrigado.html';
            })
            .catch(error => {
                console.error('Erro técnico:', error);
                // Mesmo com erro de rede, tentamos seguir para não frustrar o usuário
                window.location.href = 'obrigado.html';
            });
        });
    </script>
</body>
</html>
